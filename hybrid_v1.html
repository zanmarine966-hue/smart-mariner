<style>
    /* تصميم مؤشر الرياح المستوحى من صورتك */
    .wind-widget {
        position: absolute;
        top: 85px; /* تحت ترويسة الاسم */
        left: 15px;
        background: #0d1b2a; /* لون أزرق غامق عميق */
        border-radius: 15px;
        padding: 15px;
        width: 100px;
        text-align: center;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        border: 1px solid rgba(0, 242, 255, 0.2);
        color: white;
    }
    .wind-title { font-size: 10px; letter-spacing: 1px; opacity: 0.8; margin-bottom: 8px; }
    
    /* البوصلة المصغرة */
    .wind-compass {
        width: 50px; height: 50px;
        border: 2px solid #1b263b;
        border-radius: 50%;
        margin: 0 auto 10px;
        position: relative;
    }
    .wind-arrow {
        position: absolute; top: 50%; left: 50%;
        width: 4px; height: 30px;
        background: #00f2ff;
        margin-top: -15px; margin-left: -2px;
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%); /* شكل سهم */
        transition: transform 1s ease-in-out;
    }
    .wind-speed { font-size: 24px; font-weight: bold; color: #00f2ff; }
    .wind-unit { font-size: 12px; color: #415a77; }
    .wind-dir-text { font-size: 12px; color: #415a77; margin-top: 5px; }
</style>

<div class="wind-widget" id="windWidget">
    <div class="wind-title">LIVE WIND</div>
    <div class="wind-compass">
        <div class="wind-arrow" id="windArrow"></div>
    </div>
    <div>
        <span class="wind-speed" id="windSpeed">2</span>
        <span class="wind-unit">kts</span>
    </div>
    <div class="wind-dir-text" id="windDirText">NNW</div>
</div>

<script>
    // دالة لتحديث مؤشر الرياح برمجياً
    function updateWind(speed, degrees, directionText) {
        document.getElementById('windSpeed').innerText = speed;
        document.getElementById('windDirText').innerText = directionText;
        // تدوير السهم حسب الزاوية
        document.getElementById('windArrow').style.transform = `rotate(${degrees}deg)`;
    }

    // مثال تجريبي (يمكنك ربطه لاحقاً بـ API حقيقي للطقس)
    setTimeout(() => {
        updateWind(5, 45, 'NE'); // رياح بسرعة 5 عقد، اتجاه شمال شرقي
    }, 3000);
</script>
