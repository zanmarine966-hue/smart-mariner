<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAN X-HYBRID BETA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --danger: #ff3131; --bg-glass: rgba(1, 22, 39, 0.7); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        /* خريطة كاملة المساحة للتفاصيل */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* واجهة تحكم علوية شفافة "HUD" */
        .hud-top {
            position: absolute; top: 0; left: 0; width: 100%; height: 70px;
            background: linear-gradient(to bottom, rgba(1,22,39,0.9), transparent);
            z-index: 1000; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box; pointer-events: none;
        }
        .hud-item { pointer-events: auto; background: var(--bg-glass); border: 1px solid var(--neon); border-radius: 10px; padding: 8px 15px; color: white; font-weight: bold; backdrop-filter: blur(5px); }

        /* أزرار جانبية عائمة للتحكم السريع */
        .side-controls { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .circle-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--bg-glass); border: 2px solid var(--neon); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 0 15px rgba(0,242,255,0.3); backdrop-filter: blur(5px); }
        .circle-btn.sos { border-color: var(--danger); color: var(--danger); box-shadow: 0 0 15px rgba(255,49,49,0.3); }

        /* داشبورد سفلي مدمج وشفاف */
        .hud-bottom {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%;
            background: var(--bg-glass); border: 2px solid var(--neon); border-radius: 20px;
            z-index: 1000; display: flex; padding: 15px 0; backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dash-stat { flex: 1; text-align: center; border-right: 1px solid rgba(0,242,255,0.2); }
        .stat-val { display: block; font-size: 24px; font-weight: 900; color: white; }
        .stat-label { font-size: 10px; color: var(--neon); text-transform: uppercase; }

        /* تنبيه صيانة "ذكي" منبثق */
        #engine-alert { position: absolute; top: 85px; right: 15px; background: rgba(255,49,49,0.9); padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: bold; color: white; z-index: 1000; animation: blink 2s infinite; display: none; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    </style>
</head>
<body>

    <div id="engine-alert">⚠️ صيانة: الزيت يحتاج تغيير!</div>

    <div class="hud-top">
        <div class="hud-item" id="cap-name">كابتن: --</div>
        <div class="hud-item" style="font-family: monospace;" id="coords">GPS Fixed</div>
    </div>

    <div class="side-controls">
        <div class="circle-btn" onclick="saveSpot()">📍</div>
        <div class="circle-btn" onclick="toggleEngine()">🔧</div>
        <div class="circle-btn sos" id="sos-trigger">🚨</div>
    </div>

    <div id="map"></div>

    <div class="hud-bottom">
        <div class="dash-stat"><span class="stat-val" id="sog">0.0</span><span class="stat-label">SOG (عقدة)</span></div>
        <div class="dash-stat"><span class="stat-val" id="cog">000°</span><span class="stat-label">الاتجاه</span></div>
        <div class="dash-stat" style="border:none;"><span class="stat-val">145.5</span><span class="stat-label">ساعات المحرك</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // تحميل اسم الكابتن من ذاكرة النسخة السابقة
        document.getElementById('cap-name').innerText = "كابتن: " + (localStorage.getItem('cap_name') || "أحمد");

        // إظهار تنبيه الصيانة إذا كانت الساعات مرتفعة
        const hours = 145.5; 
        if(hours > 140) document.getElementById('engine-alert').style.display = 'block';

        // الخريطة البحرية المفصلة
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.45, 39.12], 12);
        
        const baseMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 13 }).addTo(map);
        const detailMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18 }).addTo(map);

        map.locate({watch: true, setView: true, maxZoom: 16});
        map.on('locationfound', (e) => {
            document.getElementById('coords').innerText = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
            document.getElementById('sog').innerText = (e.speed * 1.94 || 0.1).toFixed(1);
            document.getElementById('cog').innerText = (e.heading || 0).toFixed(0) + "°";
        });

        function saveSpot() { if (window.navigator.vibrate) window.navigator.vibrate(100); alert("تم حفظ موقع الصيد 🎣"); }
        function toggleEngine() { alert("ساعات المحرك الحالية: 145.5 hr\nالزيت القادم بعد: 15 hr"); }
    </script>
</body>
</html>
