<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAN X-HYBRID V2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --danger: #ff3131; --bg-glass: rgba(1, 22, 39, 0.8); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: sans-serif; }

        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* HUD الواجهة الشفافة */
        .hud-top { position: absolute; top: 0; left: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; padding: 10px 15px; pointer-events: none; }
        .hud-item { pointer-events: auto; background: var(--bg-glass); border: 1px solid var(--neon); border-radius: 8px; padding: 5px 12px; color: white; font-size: 14px; backdrop-filter: blur(5px); }

        .side-controls { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .circle-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--bg-glass); border: 2px solid var(--neon); color: white; display: flex; align-items: center; justify-content: center; font-size: 22px; backdrop-filter: blur(5px); cursor: pointer; }
        .circle-btn.sos { border-color: var(--danger); color: var(--danger); font-weight: bold; }

        .hud-bottom { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; background: var(--bg-glass); border: 2px solid var(--neon); border-radius: 15px; z-index: 1000; display: flex; padding: 12px 0; backdrop-filter: blur(10px); }
        .dash-stat { flex: 1; text-align: center; border-right: 1px solid rgba(0,242,255,0.2); }
        .stat-val { display: block; font-size: 22px; font-weight: 900; color: white; }
        .stat-label { font-size: 9px; color: var(--neon); }

        /* نافذة الإعدادات السريعة */
        #settings-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-glass); border: 2px solid var(--neon); padding: 25px; border-radius: 15px; z-index: 2000; width: 80%; backdrop-filter: blur(15px); color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.5); border: 1px solid var(--neon); color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background: var(--neon); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud-top">
        <div class="hud-item" id="cap-display">كابتن: --</div>
        <div class="hud-item" id="wind-info">الرياح: جاري التحميل..</div>
    </div>

    <div class="side-controls">
        <div class="circle-btn" onclick="toggleSettings()">⚙️</div>
        <div class="circle-btn" onclick="alert('تم حفظ الموقع 📍')">📍</div>
        <div class="circle-btn sos" id="sos-trigger">SOS</div>
    </div>

    <div id="map"></div>

    <div id="settings-modal">
        <h3>ضبط بيانات الكابتن</h3>
        <label>الاسم:</label>
        <input type="text" id="nameInput" placeholder="أدخل اسمك..">
        <label>رقم الطوارئ:</label>
        <input type="tel" id="sosInput" placeholder="9665xxxxxxxx">
        <button class="btn-save" onclick="saveSettings()">حفظ وإعادة تشغيل ⚓</button>
        <p onclick="toggleSettings()" style="text-align:center; font-size:12px; margin-top:15px; color:var(--danger); cursor:pointer;">إغلاق</p>
    </div>

    <div class="hud-bottom">
        <div class="dash-stat"><span class="stat-val" id="sog">0.0</span><span class="stat-label">SOG (عقدة)</span></div>
        <div class="dash-stat"><span class="stat-val" id="cog">000°</span><span class="stat-label">الاتجاه</span></div>
        <div class="dash-stat" style="border:none;"><span class="stat-val">24°</span><span class="stat-label">الحرارة</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // تحميل البيانات
        document.getElementById('cap-display').innerText = "كابتن: " + (localStorage.getItem('cap_name') || "سديقي");
        document.getElementById('nameInput').value = localStorage.getItem('cap_name') || "";
        document.getElementById('sosInput').value = localStorage.getItem('sos_num') || "";

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.45, 39.12], 10);
        
        // الخريطة البحرية
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // 🌬️ إضافة طبقة الرياح (OpenWeatherMap)
        L.tileLayer('https://tile.openweathermap.org/map/wind_new/{z}/{x}/{y}.png?appid=YOUR_API_KEY_OPTIONAL').addTo(map);

        map.locate({watch: true, setView: true, maxZoom: 14});
        map.on('locationfound', (e) => {
            document.getElementById('sog').innerText = (e.speed * 1.94 || 0.0).toFixed(1);
            document.getElementById('cog').innerText = (e.heading || 0).toFixed(0) + "°";
        });

        // تفعيل SOS بالرقم المسجل
        const sosBtn = document.getElementById('sos-trigger');
        let sosTimer;
        sosBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (window.navigator.vibrate) window.navigator.vibrate(200);
            sosTimer = setTimeout(() => {
                const num = localStorage.getItem('sos_num') || "997";
                window.location.href = `tel:${num}`;
            }, 3000);
        });
        sosBtn.addEventListener('touchend', () => clearTimeout(sosTimer));

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        }

        function saveSettings() {
            localStorage.setItem('cap_name', document.getElementById('nameInput').value);
            localStorage.setItem('sos_num', document.getElementById('sosInput').value);
            location.reload();
        }
    </script>
</body>
</html>
