<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mariner</title>
    <style>
        /* Glassmorphism styling */
        body {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
        }
        .button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            color: white;
            transition: background 0.3s;
        }
        .button:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div id="intro-screen">
        <h1>Welcome to Smart Mariner</h1>
        <button class="button" id="start-mission">Start Mission</button>
    </div>
    <script>
        document.getElementById('start-mission').addEventListener('click', function() {
            // Handle browser autoplay restrictions
            map.locate();
            // Trigger speech synthesis (example)
            window.speechSynthesis.speak(new SpeechSynthesisUtterance('Starting the mission!'));
            // Access camera for AR (using getUserMedia API)
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    // Use the stream for AR
                })
                .catch(function(err) {
                    console.error('Error accessing camera: ' + err);
                });
            // Hide intro screen
            document.getElementById('intro-screen').style.display = 'none';
        });
    </script>
</body>
</html>
