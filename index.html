<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAN MARINE V56 - MOBILE PRO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --danger: #ff3131; --night: #1a1a1a; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; transition: filter 0.5s; }
        
        /* شريط البيانات العلوي - مصمم للجوال */
        .hud-top { position: absolute; top: 0; width: 100%; z-index: 100; background: rgba(0,0,0,0.85); display: flex; padding: 10px 0; border-bottom: 2px solid var(--neon); backdrop-filter: blur(5px); }
        .data-box { flex: 1; text-align: center; border-left: 1px solid #333; }
        .data-box:last-child { border-left: none; }
        .v-val { display: block; font-size: 1.6rem; font-weight: 900; color: #fff; }
        .v-lbl { font-size: 10px; color: var(--neon); font-weight: bold; text-transform: uppercase; }

        /* أزرار التحكم الجانبية - كبيرة لسهولة اللمس */
        .side-menu { position: absolute; right: 12px; top: 90px; z-index: 100; display: flex; flex-direction: column; gap: 12px; }
        .m-btn { width: 58px; height: 58px; background: #111; border: 2px solid var(--neon); border-radius: 15px; color: white; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent; }
        .btn-sos { background: var(--danger); border-color: #fff; font-weight: bold; font-size: 16px; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* نافذة الخدمات السفلي (Drawer) */
        .drawer { position: absolute; bottom: -300px; left: 0; width: 100%; background: rgba(0,0,0,0.95); z-index: 200; border-top: 3px solid var(--neon); transition: bottom 0.4s; padding: 20px; color: white; box-sizing: border-box; border-radius: 20px 20px 0 0; }
        .drawer.open { bottom: 0; }
        .drawer-handle { width: 40px; height: 5px; background: #666; border-radius: 10px; margin: -10px auto 15px; }

        /* الوضع الليلي */
        .night-mode #map { filter: invert(100%) hue-rotate(180deg) brightness(0.7) contrast(1.2); }
        .night-mode .hud-top { background: #000; border-bottom-color: var(--danger); }
        .night-mode .v-lbl { color: var(--danger); }
    </style>
</head>
<body id="mainBody">

    <div id="map"></div>

    <div class="hud-top">
        <div class="data-box"><span class="v-lbl">SOG عقدة</span><span class="v-val" id="speed">0.0</span></div>
        <div class="data-box"><span class="v-lbl">الرياح</span><span class="v-val" id="wind" style="font-size: 1.2rem;">--</span></div>
        <div class="data-box"><span class="v-lbl">العمق التقريبي</span><span class="v-val" id="depth">--</span></div>
    </div>

    <div class="side-menu">
        <div class="m-btn btn-sos" onclick="sendSOS()">SOS</div>
        <div class="m-btn" onclick="toggleNight()">🌙</div>
        <div class="m-btn" onclick="openDrawer('weather')">☁️</div>
        <div class="m-btn" onclick="openDrawer('log')">📋</div>
        <div class="m-btn" onclick="map.locate({setView: true, maxZoom: 16})">🧭</div>
    </div>

    <div id="serviceDrawer" class="drawer">
        <div class="drawer-handle" onclick="closeDrawer()"></div>
        <div id="drawerContent"></div>
        <button onclick="closeDrawer()" style="width:100%; padding:12px; margin-top:15px; background:var(--neon); border:none; border-radius:10px; font-weight:bold;">إغلاق</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // إعداد الخريطة البحرية المثبتة
        const map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 22, zoomSnap: 0.5 }).setView([21.45, 39.12], 12);
        
        const oceanBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 22, maxNativeZoom: 13 }).addTo(map);
        const oceanLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', { maxZoom: 22, maxNativeZoom: 13 }).addTo(map);

        let currentPos = null;

        // 1. وظيفة الطوارئ
        function sendSOS() {
            if(currentPos) {
                const msg = `استغاثة SOS!\nالموقع: ${currentPos.lat.toFixed(5)}, ${currentPos.lng.toFixed(5)}`;
                alert(msg);
            }
        }

        // 2. الوضع الليلي
        function toggleNight() {
            document.getElementById('mainBody').classList.toggle('night-mode');
        }

        // 3. إدارة النوافذ المنبثقة
        function openDrawer(type) {
            const content = document.getElementById('drawerContent');
            if(type === 'weather') {
                content.innerHTML = `<h3>حالة الطقس الحالية</h3><p>الرياح: 12 عقدة شمالية غربية</p><p>موج البحر: 0.5 - 1.2 متر</p><p>الرؤية: ممتازة</p>`;
            } else if(type === 'log') {
                content.innerHTML = `<h3>سجل الرحلة</h3><p>المسافة المقطوعة: 4.2 ميل بحري</p><p>وقت الإبحار: 1 ساعة و 15 دقيقة</p>`;
            }
            document.getElementById('serviceDrawer').classList.add('open');
        }

        function closeDrawer() {
            document.getElementById('serviceDrawer').classList.remove('open');
        }

        // 4. تحديث الموقع والبيانات الحية
        map.locate({watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            currentPos = e.latlng;
            document.getElementById('speed').innerText = (e.speed * 1.94 || 0).toFixed(1);
            
            if (!window.boatMarker) {
                window.boatMarker = L.circleMarker(e.latlng, {color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, radius: 12, weight: 5}).addTo(map);
            } else { window.boatMarker.setLatLng(e.latlng); }
        });
    </script>
</body>
</html>
