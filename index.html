<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAN OCEAN ATLAS V30</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --deep-blue: #001a33; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: var(--deep-blue) !important; }
        
        /* HUD الملاحي الاحترافي */
        .mariner-hud { position: absolute; top: 0; width: 100%; z-index: 10; background: rgba(0, 26, 51, 0.9); display: flex; padding: 15px 0; border-bottom: 2px solid var(--neon); backdrop-filter: blur(10px); }
        .data-cell { flex: 1; text-align: center; color: white; border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .val { display: block; font-size: 1.5rem; font-weight: bold; color: #fff; }
        .lbl { font-size: 10px; color: var(--neon); font-weight: bold; }

        .nav-controls { position: absolute; right: 15px; top: 100px; z-index: 20; display: flex; flex-direction: column; gap: 15px; }
        .btn-nautic { width: 55px; height: 55px; background: rgba(0, 26, 51, 0.9); border: 2px solid var(--neon); border-radius: 12px; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="mariner-hud">
        <div class="data-cell"><span class="lbl">السرعة SOG</span><span class="val" id="spd">0.0</span></div>
        <div class="data-cell"><span class="lbl">المنطقة</span><span class="val" id="zone" style="font-size: 12px;">جاري التحديد...</span></div>
        <div class="data-cell"><span class="lbl">GPS الإحداثيات</span><span class="val" id="pos" style="font-size: 10px;">...</span></div>
    </div>

    <div class="nav-controls">
        <div class="btn-nautic" onclick="toggleMarineBase()" title="تبديل وضع الأعماق">🌊</div>
        <div class="btn-nautic" onclick="map.locate({setView: true})">🧭</div>
        <div class="btn-nautic" onclick="location.reload()">🔄</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.45, 39.12], 12);
        
        // 1. خريطة تضاريس المحيطات العالمية (تظهر خطوط القاع والأعماق)
        const oceanBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}').addTo(map);
        
        // 2. طبقة المسميات الجغرافية البحرية (جزر، شعاب، ممرات)
        const marineLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // 3. طبقة العلامات البحرية (OpenSeaMap)
        const seaMarks = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);

        map.locate({watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            document.getElementById('spd').innerText = (e.speed * 1.94 || 0).toFixed(1);
            document.getElementById('pos').innerText = e.lat.toFixed(4) + "," + e.lng.toFixed(4);
            
            // محاكاة التعرف على المنطقة بناءً على الإحداثيات
            if (e.lat > 21.6) document.getElementById('zone').innerText = "شرم أبحر";
            else if (e.lat < 21.4) document.getElementById('zone').innerText = "منطقة الميناء";
            else document.getElementById('zone').innerText = "واجهة جدة";

            if (!window.boat) {
                window.boat = L.circleMarker(e.latlng, {color: '#00f2ff', radius: 10, fillOpacity: 1, weight: 3}).addTo(map);
            } else {
                window.boat.setLatLng(e.latlng);
            }
        });

        function toggleMarineBase() {
            if (map.hasLayer(oceanBase)) {
                map.removeLayer(oceanBase);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
                alert("وضع القمر الصناعي");
            } else {
                location.reload();
            }
        }
    </script>
</body>
</html>
