<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAN MARINE V62 - MOBILE OPTIMIZED</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --danger: #ff3131; --bg-dark: #011627; --card-bg: #022c43; }
        
        /* ضبط إعدادات العرض للجوال */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            overflow: hidden; position: fixed; /* منع السحب العشوائي للشاشة */
        }
        
        /* شريط التنقل العلوي - تصميم مضغوط للجوال */
        .top-nav { 
            display: flex; background: var(--bg-dark); height: 70px; 
            border-bottom: 2px solid var(--neon); box-sizing: border-box;
            position: relative; z-index: 1000;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #8899a6; font-size: 9px; font-weight: bold; cursor: pointer; border-left: 1px solid #1a3a4a;
            -webkit-tap-highlight-color: transparent; padding: 5px 0;
        }
        .nav-item i-icon { font-size: 20px; margin-bottom: 4px; }
        .nav-item.active { color: var(--neon); background: rgba(0, 242, 255, 0.08); }
        .nav-item.sos-btn { background: var(--danger); color: white; border: none; font-size: 14px; }

        /* حاوية الصفحات */
        .page { 
            display: none; height: calc(100vh - 70px); width: 100%; 
            background: #000; overflow-y: auto; color: white; 
            padding: 20px; box-sizing: border-box; -webkit-overflow-scrolling: touch;
        }
        .page.active { display: block; }
        #map { height: 100%; width: 100%; background: #c3d9ef; }

        /* تصميم البطاقات لتناسب عرض الجوال */
        .card { 
            background: var(--card-bg); border: 1px solid rgba(0, 242, 255, 0.3); 
            border-radius: 12px; padding: 18px; margin-bottom: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card h3 { margin-top: 0; color: var(--neon); font-size: 16px; border-bottom: 1px solid #1a3a4a; padding-bottom: 8px; }
        
        /* أزرار كبيرة سهلة اللمس */
        .btn-action { 
            width: 100%; padding: 16px; background: var(--neon); border: none; 
            border-radius: 10px; font-weight: bold; font-size: 16px; 
            color: #000; cursor: pointer; margin-top: 10px;
        }
        
        /* إخفاء شريط التمرير */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-item sos-btn" onclick="triggerSOS()">🚨<br>SOS</div>
        <div class="nav-item" onclick="showPage('spotsPage', this)">📍<br>SPOTS</div>
        <div class="nav-item" onclick="showPage('enginePage', this)">🔧<br>ENGINE</div>
        <div class="nav-item" onclick="showPage('weatherPage', this)">☁️<br>WEATHER</div>
        <div class="nav-item active" onclick="showPage('navPage', this)">🧭<br>NAV</div>
    </nav>

    <div id="navPage" class="page active" style="padding:0;">
        <div id="map"></div>
    </div>

    <div id="weatherPage" class="page">
        <h3>☁️ أحوال الطقس والبحر</h3>
        <div class="card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>حالة البحر:</span><span id="sea-state" style="color:var(--neon)">هادئ</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span>سرعة الرياح:</span><span id="w-speed" style="color:var(--neon)">14 عقدة</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span>درجة الحرارة:</span><span style="color:var(--neon)">31°م</span>
            </div>
        </div>
        <button class="btn-action" onclick="alert('جاري تحديث البيانات...')">تحديث الآن</button>
    </div>

    <div id="enginePage" class="page">
        <h3>🔧 سجل صيانة المحرك</h3>
        <div class="card">
            <p style="font-size: 11px; color: #8899a6; margin:0;">إجمالي ساعات التشغيل</p>
            <p style="font-size: 2.2rem; font-weight: bold; margin: 5px 0;">145.5 <span style="font-size: 14px;">ساعة</span></p>
        </div>
        <div class="card">
            <p>التغيير القادم: <span style="color:var(--danger)">بعد 15 ساعة</span></p>
            <p>حالة الفلتر: <span style="color:var(--neon)">جيدة</span></p>
        </div>
        <button class="btn-action" onclick="alert('تم تسجيل ساعات التشغيل')">تحديث الساعات</button>
    </div>

    <div id="spotsPage" class="page">
        <h3>⚓ مواقعي المحفوظة</h3>
        <div id="spots-list">
            <div class="card" style="padding: 10px; font-size: 14px;">
                🚢 موقع الصيد الرئيسي <br>
                <span style="font-size: 11px; color: #666;">21.64642, 39.14191</span>
            </div>
        </div>
        <button class="btn-action" onclick="addNewSpot()">حفظ الموقع الحالي</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // إعداد الخريطة البحرية
        const map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 22 }).setView([21.45, 39.12], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 22, maxNativeZoom: 13 }).addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', { maxZoom: 22, maxNativeZoom: 13 }).addTo(map);

        let currentLatLng = null;

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            if(pageId === 'navPage') setTimeout(() => map.invalidateSize(), 300);
        }

        function triggerSOS() {
            if(!currentLatLng) return alert("انتظر تحديد الموقع...");
            const phone = localStorage.getItem('emergency_num') || "994";
            const msg = encodeURIComponent(`نداء استغاثة SOS!\nموقعي: ${currentLatLng.lat.toFixed(5)}, ${currentLatLng.lng.toFixed(5)}`);
            window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${msg}`);
        }

        function addNewSpot() {
            if(currentLatLng) {
                let name = prompt("أدخل اسم الموقع:");
                if(name) {
                    L.marker(currentLatLng).addTo(map).bindPopup(name).openPopup();
                    alert("تم حفظ النقطة بنجاح");
                }
            }
        }

        map.locate({watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            currentLatLng = e.latlng;
            if (!window.boatMarker) {
                window.boatMarker = L.circleMarker(e.latlng, {color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, radius: 10, weight: 3}).addTo(map);
            } else { window.boatMarker.setLatLng(e.latlng); }
        });
    </script>
</body>
</html>
