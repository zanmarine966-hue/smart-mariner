<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mariner | البحار الذكي</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Cairo', sans-serif; background: #000; color: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* واجهة التحكم */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .header { pointer-events: auto; background: rgba(0, 0, 0, 0.85); padding: 12px 25px; border-radius: 50px; border: 1px solid #00ff00; align-self: center; box-shadow: 0 0 15px rgba(0,255,0,0.4); font-weight: bold; color: #00ff00; font-size: 18px; }
        
        /* زر SOS */
        .sos-btn { pointer-events: auto; width: 90px; height: 90px; background: radial-gradient(#ff0000, #990000); border-radius: 50%; border: 4px solid #fff; box-shadow: 0 0 25px rgba(255,0,0,0.6); cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 22px; animation: pulse 2s infinite; color: white; text-decoration: none; }
        @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        /* لوحة الطوارئ */
        .emergency-panel { pointer-events: auto; background: rgba(0, 0, 0, 0.9); border: 2px solid #ff0000; border-radius: 15px; padding: 15px; width: 230px; }
        .emergency-panel h3 { color: #ff0000; margin: 0 0 10px 0; text-align: center; border-bottom: 1px solid #ff0000; padding-bottom: 5px; }
        .contact-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .contact-row span:last-child { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="overlay">
        <div class="header">كابتن أحمد | نظام الملاحة الذكي V1</div>

        <div style="display: flex; justify-content: space-between; align-items: flex-end; pointer-events: none;">
            <a href="tel:994" class="sos-btn">SOS</a>
            
            <div class="emergency-panel">
                <h3>طوارئ البحر - المملكة</h3>
                <div class="contact-row"><span>حرس الحدود</span><span>994</span></div>
                <div class="contact-row"><span>الإسعاف</span><span>997</span></div>
                <div class="contact-row"><span>طوارئ (911)</span><span>911</span></div>
                <div class="contact-row"><span>النداء العام VHF</span><span>16</span></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // إعداد الخريطة والتركيز على جدة
        const map = L.map('map', { zoomControl: false }).setView([21.5433, 39.1728], 11);
        
        // الطبقة الملاحية (Esri Oceans)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri'
        }).addTo(map);

        // طبقة العلامات البحرية (OpenSeaMap)
        L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);

        // الترحيب الصوتي
        window.onload = () => {
            const msg = new SpeechSynthesisUtterance("Welcome Captain Ahmad. Your navigational system is ready.");
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        };
    </script>
</body>
</html>
