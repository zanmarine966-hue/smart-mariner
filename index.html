<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAN MARINE V53 - FIXED ZOOM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #c3d9ef; }
        
        /* واجهة البيانات HUD */
        .mariner-hud { position: absolute; top: 0; width: 100%; z-index: 10; background: rgba(0,0,0,0.9); display: flex; padding: 15px 0; border-bottom: 3px solid var(--neon); }
        .data-cell { flex: 1; text-align: center; border-left: 1px solid #333; }
        .val { display: block; font-size: 1.8rem; font-weight: 900; color: #fff; text-shadow: 2px 2px #000; }
        .lbl { font-size: 10px; color: var(--neon); font-weight: bold; }

        .nav-tools { position: absolute; right: 15px; top: 120px; z-index: 20; display: flex; flex-direction: column; gap: 15px; }
        .btn-mariner { width: 60px; height: 60px; background: #111; border: 2px solid var(--neon); border-radius: 12px; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 0 15px #000; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="mariner-hud">
        <div class="data-cell"><span class="lbl">SOG عقدة</span><span class="val" id="speed">0.0</span></div>
        <div class="data-cell"><span class="lbl">COG الاتجاه</span><span class="val" id="cog">--</span></div>
        <div class="data-cell"><span class="lbl">GPS</span><span class="val" id="pos" style="font-size: 11px;">...</span></div>
    </div>

    <div class="nav-tools">
        <div class="btn-mariner" onclick="map.locate({setView: true, maxZoom: 17})">🧭</div>
        <div class="btn-mariner" onclick="saveWaypoint()">📍</div>
        <div class="btn-mariner" onclick="location.reload()">🔄</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // تفعيل التكبير الرقمي العالي وتثبيت الصور (maxNativeZoom)
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false, 
            maxZoom: 22, // يسمح لك بالتكبير حتى مستوى 22
            zoomSnap: 0.5 
        }).setView([21.45, 39.12], 12);
        
        // طبقة التضاريس البحرية - تثبيت NativeZoom عند 13 لمنع الاختفاء
        const oceanBase = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { 
            maxZoom: 22, 
            maxNativeZoom: 13 // السر هنا: يمنع السيرفر من طلب صور جديدة بعد مستوى 13 ويقوم بتكبير المتوفرة
        }).addTo(map);
        
        // طبقة المسميات الملاحية - تثبيت NativeZoom عند 13
        const oceanLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', { 
            maxZoom: 22, 
            maxNativeZoom: 13 // يحافظ على بقاء الأسماء واضحة حتى مع التكبير العالي
        }).addTo(map);

        function saveWaypoint() {
            if(window.currentLatLng) {
                L.marker(window.currentLatLng).addTo(map).bindPopup("نقطة صيد").openPopup();
                alert("تم حفظ الموقع");
            }
        }

        map.locate({watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            window.currentLatLng = e.latlng;
            document.getElementById('speed').innerText = (e.speed * 1.94 || 0).toFixed(1);
            if(e.heading) document.getElementById('cog').innerText = Math.round(e.heading) + '°';
            document.getElementById('pos').innerText = e.lat.toFixed(5) + "," + e.lng.toFixed(5);
            
            if (!window.boatMarker) {
                window.boatMarker = L.circleMarker(e.latlng, {color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, radius: 12, weight: 5}).addTo(map);
            } else { window.boatMarker.setLatLng(e.latlng); }
        });
    </script>
</body>
</html>
