<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAN MARINE V50 - TOTAL NAV</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --bg: #000; --danger: #ff4444; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* واجهة البيانات العلوية (HUD) */
        .mariner-hud { position: absolute; top: 0; width: 100%; z-index: 10; background: rgba(0,0,0,0.9); display: flex; padding: 15px 0; border-bottom: 3px solid var(--neon); }
        .data-cell { flex: 1; text-align: center; border-left: 1px solid #333; }
        .val { display: block; font-size: 1.8rem; font-weight: 900; color: #fff; text-shadow: 2px 2px #000; }
        .lbl { font-size: 10px; color: var(--neon); font-weight: bold; }

        /* الأزرار الملاحية الجانبية */
        .nav-tools { position: absolute; right: 15px; top: 120px; z-index: 20; display: flex; flex-direction: column; gap: 15px; }
        .btn-mariner { width: 60px; height: 60px; background: #111; border: 3px solid var(--neon); border-radius: 12px; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 0 15px #000; transition: 0.2s; }
        .active { background: var(--neon) !important; color: black !important; }
        
        /* مظهر المسميات الملاحية */
        .bright-labels { filter: brightness(1.5) contrast(1.2) invert(1) grayscale(1); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="mariner-hud">
        <div class="data-cell"><span class="lbl">SOG السرعة (عقدة)</span><span class="val" id="speed">0.0</span></div>
        <div class="data-cell"><span class="lbl">COG الاتجاه</span><span class="val" id="cog">--</span></div>
        <div class="data-cell"><span class="lbl">إحداثيات الموقع</span><span class="val" id="pos" style="font-size: 11px;">...</span></div>
    </div>

    <div class="nav-tools">
        <div class="btn-mariner" onclick="map.locate({setView: true, maxZoom: 16})">🧭</div>
        <div class="btn-mariner" onclick="saveWaypoint()" title="حفظ نقطة صيد">📍</div>
        <div class="btn-mariner" onclick="togglePath()" id="pathBtn" title="تتبع المسار">🧶</div>
        <div class="btn-mariner" onclick="toggleDepth()" id="depthBtn" title="أرقام الأعماق">⚓</div>
        <div class="btn-mariner" onclick="clearData()" style="border-color: var(--danger)" title="مسح الذاكرة">🗑️</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 20 }).setView([21.45, 39.12], 13);
        
        // --- تثبيت الخرائط ---
        const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);
        const labelsLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20, className: 'bright-labels' }).addTo(map);
        const depthLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 13, opacity: 0.7 });

        // --- متغيرات النظام ---
        let currentPos = null;
        let isTracking = false;
        let pathArray = JSON.parse(localStorage.getItem('zan_path')) || [];
        let waypoints = JSON.parse(localStorage.getItem('zan_points')) || [];
        let polyline = L.polyline(pathArray, {color: '#ffff00', weight: 4, dashArray: '5, 10'}).addTo(map);

        // تحميل النقاط المحفوظة
        waypoints.forEach(p => L.marker([p.lat, p.lng]).addTo(map).bindPopup(p.name));

        // --- الوظائف ---
        function toggleDepth() {
            if (map.hasLayer(depthLayer)) { map.removeLayer(depthLayer); document.getElementById('depthBtn').classList.remove('active'); }
            else { depthLayer.addTo(map); document.getElementById('depthBtn').classList.add('active'); }
        }

        function togglePath() {
            isTracking = !isTracking;
            document.getElementById('pathBtn').classList.toggle('active');
            if(isTracking) alert("تم تفعيل تتبع المسار");
        }

        function saveWaypoint() {
            if(currentPos) {
                let name = prompt("أدخل اسم النقطة (مثلاً: مطارح صيد):", "نقطة " + new Date().toLocaleTimeString());
                if(name) {
                    let point = {lat: currentPos.lat, lng: currentPos.lng, name: name};
                    waypoints.push(point);
                    localStorage.setItem('zan_points', JSON.stringify(waypoints));
                    L.marker(currentPos).addTo(map).bindPopup(name).openPopup();
                }
            }
        }

        function clearData() {
            if(confirm("هل تريد مسح جميع المسارات والنقاط المحفوظة؟")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- تتبع GPS ---
        map.locate({watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            currentPos = e.latlng;
            document.getElementById('speed').innerText = (e.speed * 1.94384 || 0).toFixed(1);
            if(e.heading) document.getElementById('cog').innerText = Math.round(e.heading) + '°';
            document.getElementById('pos').innerText = e.lat.toFixed(5) + " , " + e.lng.toFixed(5);
            
            if(isTracking) {
                pathArray.push([e.lat, e.lng]);
                polyline.setLatLngs(pathArray);
                localStorage.setItem('zan_path', JSON.stringify(pathArray));
            }

            if (!window.boatMarker) {
                window.boatMarker = L.circleMarker(e.latlng, {color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, radius: 12, weight: 5}).addTo(map);
            } else { window.boatMarker.setLatLng(e.latlng); }
        });
    </script>
</body>
</html>
