<script>
    // دالة محاكاة الرادار الحي بناءً على موقعك الفعلي
    function startLiveRadar() {
        if (!userPos) {
            alert("يرجى تفعيل الـ GPS أولاً للبدء بمسح المنطقة");
            return;
        }

        alert("بدء مسح الرادار AIS للمنطقة المحيطة...");
        
        // محاكاة جلب بيانات السفن الحقيقية حول موقعك
        const mockShips = [
            { name: "NA ناقلة نفط", lat: userPos.lat + 0.005, lng: userPos.lng + 0.003, speed: "12 عقدة" },
            { name: "YACHT 777", lat: userPos.lat - 0.008, lng: userPos.lng - 0.005, speed: "22 عقدة" }
        ];

        mockShips.forEach(ship => {
            const shipMarker = L.marker([ship.lat, ship.lng], {
                icon: L.divIcon({
                    className: 'radar-ship',
                    html: `<div style="background:red; width:10px; height:10px; border-radius:50%; box-shadow:0 0 10px red;"></div>
                           <span style="color:white; font-size:10px; white-space:nowrap;">${ship.name}</span>`
                })
            }).addTo(aisLayer);
            
            shipMarker.bindPopup(`<b>سفينة مكتشفة</b><br>السرعة: ${ship.speed}`);
        });
    }
</script>
