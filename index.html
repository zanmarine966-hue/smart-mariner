<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAN MARINE V73 - MOBILE FIX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --danger: #ff3131; --bg: #011627; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* شاشة الترحيب */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #022c43 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s;
        }

        /* منبه الأخطاء للجوال */
        #mobile-status {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(255,0,0,0.8); padding: 10px; border-radius: 5px; 
            font-size: 12px; z-index: 10000; display: none;
        }

        #map { height: calc(100% - 80px); width: 100%; background: #011627; }

        .top-nav { display: flex; background: var(--bg); height: 80px; border-top: 2px solid var(--neon); position: fixed; bottom: 0; width: 100%; z-index: 2000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; }
        .nav-item.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .sos-btn { background: var(--danger); width: 80px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="font-size: 50px;">⚓</div>
        <h1 style="color:white;">ZAN MARINE</h1>
        <p id="welcome-text">جاري تشغيل الأنظمة الملاحية..</p>
    </div>

    <div id="mobile-status"></div>

    <div id="map"></div>

    <nav class="top-nav">
        <div class="nav-item sos-btn">🚨 SOS</div>
        <div class="nav-item active">🧭 ملاحة</div>
        <div class="nav-item" onclick="location.reload()">🔄 تحديث</div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // إظهار رسائل الخطأ على شاشة الجوال مباشرة للتشخيص
        function logError(msg) {
            const el = document.getElementById('mobile-status');
            el.style.display = 'block';
            el.innerText = "تنبيه: " + msg;
        }

        // تحميل اسم الكابتن
        const captain = localStorage.getItem('cap_name') || "سديقي";
        document.getElementById('welcome-text').innerText = `أهلاً بك يا كابتن ${captain}`;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800);
            }, 2500);
        };

        // محاولة تشغيل الخريطة مع معالجة أخطاء الجوال
        try {
            const map = L.map('map', { zoomControl: false }).setView([21.45, 39.12], 12);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // طلب الموقع مع معالجة الرفض
            map.locate({setView: true, maxZoom: 16});
            
            map.on('locationerror', (e) => {
                logError("يرجى تفعيل الـ GPS والسماح للمتصفح بالوصول لموقعك.");
            });

            map.on('locationfound', (e) => {
                L.circleMarker(e.latlng, {color: '#00f2ff', radius: 10}).addTo(map);
            });

        } catch (err) {
            logError("فشل تحميل الخريطة. تأكد من اتصال الإنترنت.");
        }
    </script>
</body>
</html>
