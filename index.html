<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAN MARINE V65 - SETTINGS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --danger: #ff3131; --bg: #011627; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: sans-serif; overflow: hidden; transition: 0.3s; }
        
        .top-nav { display: flex; background: var(--bg); height: 65px; border-bottom: 2px solid var(--neon); z-index: 2000; position: relative; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8899a6; font-size: 9px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .nav-item.sos-btn { background: var(--danger); color: white; border: none; font-size: 14px; }

        .page-container { height: calc(100% - 65px); width: 100%; position: relative; }
        .page { display: none; height: 100%; width: 100%; overflow-y: auto; background: #000; color: white; padding: 15px; box-sizing: border-box; }
        .page.active { display: block; }
        
        #map { height: 100%; width: 100%; }
        .card { background: #022c43; border: 1px solid var(--neon); border-radius: 10px; padding: 15px; margin-bottom: 12px; }
        
        select, input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--neon); background: #000; color: white; font-size: 16px; }
        .setting-label { display: block; margin-top: 15px; color: var(--neon); font-size: 14px; }
    </style>
</head>
<body id="appBody">

    <nav class="top-nav">
        <div class="nav-item sos-btn" onclick="triggerSOS()">🚨 SOS</div>
        <div class="nav-item active" onclick="showPage('navPage', this)" data-key="nav">🧭 NAV</div>
        <div class="nav-item" onclick="showPage('spotsPage', this)" data-key="spots">📍 SPOTS</div>
        <div class="nav-item" onclick="showPage('enginePage', this)" data-key="engine">🔧 ENGINE</div>
        <div class="nav-item" onclick="showPage('weatherPage', this)" data-key="weather">☁️ WEATHER</div>
        <div class="nav-item" onclick="showPage('settingsPage', this)" data-key="settings">⚙️ SETTINGS</div>
    </nav>

    <div class="page-container">
        <div id="navPage" class="page active" style="padding:0;"><div id="map"></div></div>

        <div id="settingsPage" class="page">
            <h2 data-key="settings_title">الإعدادات / Settings</h2>
            
            <div class="card">
                <span class="setting-label" data-key="lang_label">اللغة / Language</span>
                <select id="langSelect" onchange="updateLanguage()">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>

                <span class="setting-label" data-key="unit_label">نظام القياس / Units</span>
                <select id="unitSelect" onchange="updateUnits()">
                    <option value="metric">متري (متر - كم/س)</option>
                    <option value="nautical">بحري (قدم - عقدة)</option>
                </select>
            </div>
            
            <div class="card">
                <span class="setting-label" data-key="sos_num_label">رقم الطوارئ</span>
                <input type="tel" id="sosNum" placeholder="9665xxxxxxxx" onchange="localStorage.setItem('sos_num', this.value)">
            </div>
        </div>

        <div id="spotsPage" class="page"><h3 data-key="spots_title">مواقعي</h3><div id="spots-list"></div></div>
        <div id="enginePage" class="page"><h3 data-key="engine_title">المحرك</h3><div class="card"><p id="engine-txt">145.5 ساعة</p></div></div>
        <div id="weatherPage" class="page"><h3 data-key="weather_title">الطقس</h3><div class="card"><p id="wind-txt">14 عقدة</p></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const i18n = {
            ar: { nav: "🧭 ملاحة", spots: "📍 مواقعي", engine: "🔧 محرك", weather: "☁️ طقس", settings: "⚙️ ضبط", settings_title: "إعدادات النظام", lang_label: "اللغة", unit_label: "وحدات القياس", sos_num_label: "رقم الطوارئ", spots_title: "نقاط الصيد المحفوظة" },
            en: { nav: "🧭 NAV", spots: "📍 SPOTS", engine: "🔧 ENGINE", weather: "☁️ WEATHER", settings: "⚙️ SETTINGS", settings_title: "System Settings", lang_label: "Language", unit_label: "Unit System", sos_num_label: "Emergency Number", spots_title: "Saved Fishing Spots" }
        };

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.45, 39.12], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 13 }).addTo(map);

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            if(pageId === 'navPage') setTimeout(() => map.invalidateSize(), 300);
        }

        function updateLanguage() {
            const lang = document.getElementById('langSelect').value;
            localStorage.setItem('app_lang', lang);
            document.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerText = i18n[lang][key];
            });
        }

        function updateUnits() {
            const unit = document.getElementById('unitSelect').value;
            localStorage.setItem('app_units', unit);
            const speed = unit === 'nautical' ? "14 Knot" : "26 Km/h";
            document.getElementById('wind-txt').innerText = speed;
        }

        // استعادة التفضيلات عند التشغيل
        window.onload = () => {
            const savedLang = localStorage.getItem('app_lang') || 'ar';
            const savedUnit = localStorage.getItem('app_units') || 'nautical';
            document.getElementById('langSelect').value = savedLang;
            document.getElementById('unitSelect').value = savedUnit;
            document.getElementById('sosNum').value = localStorage.getItem('sos_num') || "";
            updateLanguage();
            updateUnits();
        };

        function triggerSOS() {
            const phone = localStorage.getItem('sos_num') || "911";
            window.open(`https://api.whatsapp.com/send?phone=${phone}&text=SOS_ZAN_MARINE`);
        }

        map.locate({watch: true, setView: true, maxZoom: 14});
        map.on('locationfound', (e) => {
            if (!window.boatMarker) {
                window.boatMarker = L.circleMarker(e.latlng, {color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, radius: 10}).addTo(map);
            } else { window.boatMarker.setLatLng(e.latlng); }
        });
    </script>
</body>
</html>
