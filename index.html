<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAN MARINE V72 - STABLE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --danger: #ff3131; --bg: #011627; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }

        /* شاشة الترحيب السينمائية */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #022c43 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 1.2s ease-out, visibility 1.2s;
        }
        .splash-logo { width: 140px; height: 140px; border: 4px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; box-shadow: 0 0 30px var(--neon); color: white; }

        /* القائمة العلوية الأصلية */
        .top-nav { display: flex; background: var(--bg); height: 80px; border-bottom: 3px solid var(--neon); z-index: 2000; position: relative; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 900; cursor: pointer; }
        .nav-item.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .sos-btn { background: var(--danger); position: relative; width: 95px; }
        #sos-progress { position: absolute; bottom: 0; left: 0; height: 100%; background: rgba(255,255,255,0.3); width: 0%; }

        .page-container { height: calc(100% - 80px); width: 100%; position: relative; }
        .page { display: none; height: 100%; width: 100%; overflow-y: auto; background: #000; color: white; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }

        #map { height: 100%; width: 100%; background: #011627; }
        #coord-display { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 2px solid var(--neon); padding: 8px; border-radius: 50px; z-index: 1001; font-family: monospace; font-size: 14px; width: 85%; text-align: center; color: white; }

        /* واجهة الصيانة الأصلية */
        .card { background: #022c43; border: 2px solid var(--neon); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; background: #000; color: white; border: 2px solid var(--neon); border-radius: 10px; font-size: 18px; margin-top: 10px; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 18px; background: var(--neon); border: none; border-radius: 10px; font-weight: 900; font-size: 18px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">⚓</div>
        <h2 style="color:white; margin-top:20px;">ZAN MARINE</h2>
        <div id="welcome-msg" style="color:var(--neon);">أهلاً يا كابتن..</div>
    </div>

    <div id="coord-display">GPS: جاري البحث..</div>

    <nav class="top-nav">
        <div class="nav-item sos-btn" id="sos-trigger"><div id="sos-progress"></div><span style="z-index:2">🚨 SOS</span></div>
        <div class="nav-item active" onclick="navTo('navPage', this)">🧭 ملاحة</div>
        <div class="nav-item" onclick="navTo('spotsPage', this)">📍 مواقعي</div>
        <div class="nav-item" onclick="navTo('enginePage', this)">🔧 صيانة</div>
        <div class="nav-item" onclick="navTo('settingsPage', this)">⚙️ ضبط</div>
    </nav>

    <div class="page-container">
        <div id="navPage" class="page active" style="padding:0;"><div id="map"></div></div>

        <div id="enginePage" class="page">
            <h3>متابعة الصيانة</h3>
            <div class="card">
                <div style="text-align:center; font-weight:bold;">ساعات تشغيل المحرك</div>
                <div style="font-size:45px; font-weight:900; text-align:center; margin:15px 0;">hr 145.5</div>
            </div>
            <div class="card" style="border-color: var(--danger);">
                <p style="text-align:right; margin:5px 0; color:var(--danger);">موعد تغيير الزيت القادم: <b>بعد 15 ساعة</b></p>
                <p style="text-align:right; margin:5px 0; font-size:14px; opacity:0.8;">آخر فحص للفلتر: 10-04-2026</p>
            </div>
            <button class="btn-action">تسجيل صيانة جديدة</button>
        </div>

        <div id="settingsPage" class="page">
            <h3>الإعدادات</h3>
            <div class="card">
                <label>اسم الكابتن:</label>
                <input type="text" id="capNameInput" placeholder="أدخل اسمك..">
                <button class="btn-action" onclick="saveCaptainData()">حفظ التعديلات ✅</button>
            </div>
        </div>
        
        <div id="spotsPage" class="page"><h3>مواقعي</h3><button class="btn-action">+ حفظ نقطة جديدة</button></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const savedName = localStorage.getItem('cap_name') || "سديقي";
        document.getElementById('welcome-msg').innerText = `أهلاً يا كابتن ${savedName}..`;

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => splash.style.display = 'none', 1200);
            }, 3000);
        });

        function saveCaptainData() {
            localStorage.setItem('cap_name', document.getElementById('capNameInput').value);
            alert("تم الحفظ! سيتم التحديث عند إعادة التشغيل.");
        }

        function navTo(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            if(pageId === 'navPage') setTimeout(() => map.invalidateSize(), 200);
        }

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.45, 39.12], 12);
        // العودة للخريطة البحرية
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}').addTo(map);

        map.locate({watch: true, setView: true, maxZoom: 16});
        map.on('locationfound', (e) => {
            document.getElementById('coord-display').innerText = `LAT: ${e.latlng.lat.toFixed(5)} | LON: ${e.latlng.lng.toFixed(5)}`;
        });
    </script>
</body>
</html>
