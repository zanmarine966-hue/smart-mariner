<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAN MARINE ULTIMATE V35</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: #001529; }
        
        /* شريط المعلومات الملاحي المطور */
        .nav-hud { position: absolute; top: 0; width: 100%; z-index: 10; background: rgba(0, 11, 20, 0.9); display: flex; padding: 12px 0; border-bottom: 2px solid var(--neon); backdrop-filter: blur(10px); }
        .data-item { flex: 1; text-align: center; color: white; border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .v-data { display: block; font-size: 1.5rem; font-weight: bold; font-family: monospace; }
        .v-lbl { font-size: 10px; color: var(--neon); font-weight: bold; text-transform: uppercase; }

        /* أزرار التحكم الجانبية */
        .btn-stack { position: absolute; right: 15px; top: 100px; z-index: 20; display: flex; flex-direction: column; gap: 15px; }
        .m-btn { width: 55px; height: 55px; background: rgba(0, 11, 20, 0.9); border: 2px solid var(--neon); border-radius: 12px; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.8); transition: 0.2s; }
        .m-btn:active { transform: scale(0.9); background: var(--neon); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="nav-hud">
        <div class="data-item"><span class="v-lbl">SOG السرعة (عقدة)</span><span class="v-data" id="spd">0.0</span></div>
        <div class="data-item"><span class="v-lbl">COG الاتجاه</span><span class="v-data" id="cog">--</span></div>
        <div class="data-item"><span class="v-lbl">GPS الإحداثيات</span><span class="v-data" id="pos" style="font-size: 10px;">بانتظار الإشارة...</span></div>
    </div>

    <div class="btn-stack">
        <div class="m-btn" title="تحديد موقعي" onclick="map.locate({setView: true, maxZoom: 16})">🧭</div>
        <div class="m-btn" title="تحديث الصفحة" onclick="location.reload()">🔄</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // إعداد الخريطة بأعلى دقة تكبير ممكنة
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false,
            maxZoom: 22 
        }).setView([21.45, 39.12], 13);
        
        // 1. قاعدة الأقمار الصناعية (ثبات مطلق ولا تختفي أبداً)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 22
        }).addTo(map);
        
        // 2. طبقة المرجعية الملاحية (الأسماء، الشعاب، الأعماق)
        // تعمل كشفافية فوق القمر الصناعي لتظهر أسماء مثل "Shi'b Jahan"
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 20,
            opacity: 0.8 
        }).addTo(map);

        // 3. طبقة العلامات البحرية (البوويات والمنارات)
        L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
            maxZoom: 18
        }).addTo(map);

        // نظام تتبع الموقع والسرعة
        map.locate({watch: true, enableHighAccuracy: true});
        
        map.on('locationfound', (e) => {
            // تحويل السرعة من م/ث إلى عقدة
            const speedKnot = (e.speed * 1.94384) || 0;
            document.getElementById('spd').innerText = speedKnot.toFixed(1);
            
            // تحديث الاتجاه
            if(e.heading !== undefined && e.heading !== null) {
                document.getElementById('cog').innerText = Math.round(e.heading) + '°';
            }
            
            // تحديث الإحداثيات
            document.getElementById('pos').innerText = e.lat.toFixed(5) + " , " + e.lng.toFixed(5);
            
            // تحديث أيقونة القارب على الخريطة
            if (!window.boatMarker) {
                window.boatMarker = L.circleMarker(e.latlng, {
                    color: '#00f2ff', 
                    fillColor: '#00f2ff',
                    fillOpacity: 0.8,
                    radius: 10, 
                    weight: 3
                }).addTo(map);
            } else {
                window.boatMarker.setLatLng(e.latlng);
            }
        });

        map.on('locationerror', () => {
            document.getElementById('pos').innerText = "خطأ في تحديد الموقع";
        });
    </script>
</body>
</html>
