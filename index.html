<script>
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.45, 39.12], 12);
    
    // 1. خريطة الأقمار الصناعية (الأساسية)
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
    
    // 2. خريطة الأعماق والأسماء (OpenSeaMap) - تحتوي على أسماء الجزر والشعاب
    const depthLayer = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);

    // 3. طبقة تضاريس القاع (اختيارية للرؤية الطبوغرافية)
    const oceanRelief = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}');

    // ميزة البحث عن الشعاب المرجانية المعروفة
    const reefs = [
        { name: "شعاب أبو مدفع", loc: [21.683, 38.966] },
        { name: "شعاب المسماري", loc: [21.316, 39.016] },
        { name: "جزيرة جبل الليث", loc: [20.250, 39.916] }
    ];

    reefs.forEach(reef => {
        L.circle(reef.loc, {color: 'orange', radius: 500}).addTo(map).bindPopup(reef.name);
    });

    // تبديل بين رؤية الأقمار الصناعية وتضاريس القاع
    function toggleSatellite() {
        if (map.hasLayer(satellite)) {
            map.removeLayer(satellite);
            oceanRelief.addTo(map);
            alert("تم التبديل لرؤية تضاريس القاع (Ocean Relief)");
        } else {
            map.removeLayer(oceanRelief);
            satellite.addTo(map);
            alert("تم التبديل لرؤية الأقمار الصناعية");
        }
    }
</script>
