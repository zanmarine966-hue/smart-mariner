<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAN MARINE V72 - CAPTAIN PROFILE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --danger: #ff3131; --warning: #ffcc00; --safe: #39ff14; --bg: #011627; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }

        /* 🎬 شاشة الترحيب المخصصة */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #022c43 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 1.2s ease-out, visibility 1.2s;
        }
        .splash-logo { width: 140px; height: 140px; border: 4px solid var(--neon); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 50px; 
            box-shadow: 0 0 30px var(--neon); animation: pulse 2s infinite; color: white; }
        .splash-text { margin-top: 25px; color: white; font-size: 24px; font-weight: bold; }
        #welcome-msg { color: var(--neon); margin-top: 10px; font-size: 18px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* ترويسة التطبيق */
        .top-nav { display: flex; background: var(--bg); height: 80px; border-bottom: 3px solid var(--neon); z-index: 2000; position: relative; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 900; }
        .nav-item.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .sos-btn { background: var(--danger); position: relative; width: 90px; }
        #sos-progress { position: absolute; bottom: 0; left: 0; height: 100%; background: rgba(255,255,255,0.3); width: 0%; }

        .page-container { height: calc(100% - 80px); width: 100%; position: relative; }
        .page { display: none; height: 100%; width: 100%; overflow-y: auto; background: #000; color: white; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }

        #map { height: 100%; width: 100%; }
        #coord-display { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 2px solid var(--neon); padding: 8px; border-radius: 50px; z-index: 1001; font-family: monospace; font-size: 14px; width: 85%; text-align: center; }

        /* تصميم الإعدادات */
        .card { background: #022c43; border: 2px solid var(--neon); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; background: #000; color: white; border: 2px solid var(--neon); border-radius: 10px; font-size: 18px; margin-top: 10px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 18px; background: var(--neon); border: none; border-radius: 10px; font-weight: 900; font-size: 18px; margin-top: 15px; }

        .floating-dash { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(1, 22, 39, 0.9); border: 2px solid var(--neon); border-radius: 15px; display: flex; z-index: 1001; padding: 10px 0; }
        .dash-item { flex: 1; text-align: center; border-right: 1px solid rgba(0, 242, 255, 0.2); }
        .dash-val { display: block; font-size: 20px; font-weight: 900; }
        .dash-label { font-size: 10px; color: var(--neon); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo">⚓</div>
        <div class="splash-text">ZAN MARINE</div>
        <div id="welcome-msg">أهلاً يا كابتن..</div>
    </div>

    <div id="coord-display">GPS: جاري البحث..</div>

    <nav class="top-nav">
        <div class="nav-item sos-btn" id="sos-trigger"><div id="sos-progress"></div><span style="z-index:2">🚨 SOS</span></div>
        <div class="nav-item active" onclick="navTo('navPage', this)">🧭 ملاحة</div>
        <div class="nav-item" onclick="navTo('spotsPage', this)">📍 مواقعي</div>
        <div class="nav-item" onclick="navTo('enginePage', this)">🔧 صيانة</div>
        <div class="nav-item" onclick="navTo('settingsPage', this)">⚙️ ضبط</div>
    </nav>

    <div class="page-container">
        <div id="navPage" class="page active" style="padding:0;">
            <div id="map"></div>
            <div class="floating-dash">
                <div class="dash-item"><span class="dash-val" id="dash-sog">0.0</span><span class="dash-label">SOG (عقدة)</span></div>
                <div class="dash-item"><span class="dash-val" id="dash-cog">000°</span><span class="dash-label">بوصلة</span></div>
                <div class="dash-item" style="border:none;"><span class="dash-val" id="dash-depth">--</span><span class="dash-label">عمق (م)</span></div>
            </div>
        </div>

        <div id="settingsPage" class="page">
            <h3>إعدادات القائد</h3>
            <div class="card">
                <label>اسم الكابتن:</label>
                <input type="text" id="capNameInput" placeholder="أدخل اسمك هنا..">
                <p style="font-size: 12px; color: var(--neon); margin-top: 10px;">* هذا الاسم سيظهر في شاشة الترحيب.</p>
            </div>
            <div class="card">
                <label>رقم الطوارئ:</label>
                <input type="tel" id="sosNumInput" placeholder="9665xxxxxxxx">
            </div>
            <button class="btn-save" onclick="saveCaptainData()">حفظ التعديلات ✅</button>
        </div>

        <div id="enginePage" class="page"><h3>المحرك</h3></div>
        <div id="spotsPage" class="page"><h3>المواقع</h3></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // تحميل البيانات عند البداية
        const savedName = localStorage.getItem('cap_name') || "سديقي";
        document.getElementById('welcome-msg').innerText = `أهلاً يا كابتن ${savedName}..`;
        document.getElementById('capNameInput').value = savedName === "سديقي" ? "" : savedName;
        document.getElementById('sosNumInput').value = localStorage.getItem('sos_num') || "";

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => { splash.style.visibility = 'hidden'; }, 1200);
            }, 3000);
        });

        function saveCaptainData() {
            const name = document.getElementById('capNameInput').value || "سديقي";
            const sos = document.getElementById('sosNumInput').value;
            localStorage.setItem('cap_name', name);
            localStorage.setItem('sos_num', sos);
            haptic();
            alert("تم تحديث بيانات الكابتن بنجاح!");
            location.reload(); // لإعادة تحديث شاشة الترحيب
        }

        function haptic() { if (window.navigator.vibrate) window.navigator.vibrate(50); }

        function navTo(pageId, el) {
            haptic();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            el.classList.add('active');
            if(pageId === 'navPage') setTimeout(() => map.invalidateSize(), 200);
        }

        // SOS بالضغط المطول
        let sosTimer, sosProgress = 0;
        const sosBtn = document.getElementById('sos-trigger');
        sosBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            sosTimer = setInterval(() => {
                sosProgress += 4;
                document.getElementById('sos-progress').style.width = sosProgress + "%";
                if (sosProgress >= 100) { clearInterval(sosTimer); alert("🚨 استغاثة من الكابتن " + localStorage.getItem('cap_name')); }
            }, 100);
        });
        sosBtn.addEventListener('touchend', () => { clearInterval(sosTimer); sosProgress = 0; document.getElementById('sos-progress').style.width = "0%"; });

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.45, 39.12], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}').addTo(map);
    </script>
</body>
</html>
