<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAN SMART MARINER V22</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: Arial, sans-serif; }
        
        /* شاشة انطلاق بسيطة جداً لكسر الجمود */
        #launch-pad { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #06121e; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #00f2ff; }
        #start-btn { padding: 25px 60px; background: transparent; border: 3px solid #00f2ff; color: #00f2ff; border-radius: 50px; font-size: 24px; font-weight: bold; cursor: pointer; text-shadow: 0 0 10px #00f2ff; box-shadow: 0 0 20px rgba(0,242,255,0.3); }

        #ar-stream { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; display: none; }
        #map { height: 100vh; width: 100vw; z-index: 1; background: transparent !important; }
        .leaflet-container { background: transparent !important; }

        .ui-panel { position: absolute; top: 0; width: 100%; z-index: 10; background: rgba(0,0,0,0.6); display: flex; padding: 10px 0; border-bottom: 2px solid #00f2ff; backdrop-filter: blur(5px); display: none; }
        .stat { flex: 1; text-align: center; color: white; }
        .val { display: block; font-size: 22px; font-weight: bold; }
        .lbl { font-size: 10px; color: #00f2ff; }

        .side-tools { position: absolute; right: 20px; top: 100px; z-index: 20; display: none; flex-direction: column; gap: 20px; }
        .circle-btn { width: 60px; height: 60px; background: rgba(0,0,0,0.7); border: 2px solid #00f2ff; border-radius: 50%; color: white; font-size: 25px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="launch-pad">
        <h1 style="margin:0;">ZAN PRO</h1>
        <p style="margin-bottom:30px;">تجهيز الأنظمة الملاحية...</p>
        <button id="start-btn" onclick="activateSystem()">START</button>
    </div>

    <video id="ar-stream" autoplay playsinline></video>
    <div id="map"></div>

    <div class="ui-panel" id="top-hud">
        <div class="stat"><span class="lbl">SOG السرعة</span><span class="val" id="speed">0.0</span></div>
        <div class="stat"><span class="lbl">إحداثيات</span><span class="val" id="pos" style="font-size:12px;">--</span></div>
    </div>

    <div class="side-tools" id="side-menu">
        <div class="circle-btn" onclick="toggleCamera()">👓</div>
        <div class="circle-btn" onclick="location.reload()">🔄</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        function activateSystem() {
            // إخفاء شاشة التحميل
            document.getElementById('launch-pad').style.display = 'none';
            document.getElementById('top-hud').style.display = 'flex';
            document.getElementById('side-menu').style.display = 'flex';

            // تشغيل الخريطة (فقط طبقة واحدة لضمان السرعة)
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.45, 39.12], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // تفعيل GPS
            map.locate({watch: true, enableHighAccuracy: true});
            map.on('locationfound', (e) => {
                document.getElementById('speed').innerText = (e.speed * 1.94 || 0).toFixed(1);
                document.getElementById('pos').innerText = e.lat.toFixed(4) + "," + e.lng.toFixed(4);
            });
            
            alert("تم تشغيل النظام. اضغط على أيقونة النظارة لتشغيل الكاميرا.");
        }

        async function toggleCamera() {
            const v = document.getElementById('ar-stream');
            if (v.style.display === 'none' || !v.style.display) {
                try {
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    v.srcObject = s;
                    v.style.display = 'block';
                    document.getElementById('map').style.opacity = '0.5';
                } catch (err) { alert("عذراً: الكاميرا تتطلب رابط HTTPS آمن"); }
            } else {
                v.style.display = 'none';
                document.getElementById('map').style.opacity = '1';
            }
        }
    </script>
</body>
</html>
