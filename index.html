<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAN SMART MARINER V10</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00f2ff; --glass: rgba(6, 18, 30, 0.95); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Cairo', sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; box-sizing: border-box; }
        .top-bar { pointer-events: auto; background: var(--glass); border: 1px solid var(--blue); border-radius: 15px; display: grid; grid-template-columns: repeat(4, 1fr); padding: 12px; backdrop-filter: blur(10px); }
        .box { text-align: center; border-left: 1px solid rgba(0, 242, 255, 0.2); }
        .box:last-child { border-left: none; }
        .val { font-family: 'Orbitron', sans-serif; font-size: 16px; color: #fff; display: block; }
        .lbl { font-size: 9px; color: var(--blue); font-weight: bold; }
        .sos { pointer-events: auto; width: 70px; height: 70px; background: red; border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; position: absolute; bottom: 100px; right: 20px; box-shadow: 0 0 20px red; animation: p 2s infinite; text-decoration: none; }
        @keyframes p { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .nav { pointer-events: auto; background: var(--glass); border-top: 2px solid var(--blue); display: flex; justify-content: space-around; padding: 15px; border-radius: 20px 20px 0 0; }
        .item { color: #fff; font-size: 11px; text-align: center; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="hud">
        <div class="top-bar">
            <div class="box"><span class="lbl">SOG</span><span class="val" id="s">0.0</span></div>
            <div class="box"><span class="lbl">COG</span><span class="val">310°</span></div>
            <div class="box"><span class="lbl">DPTH</span><span class="val">12.5m</span></div>
            <div class="box"><span class="lbl">WIND</span><span class="val">14knt</span></div>
        </div>
        <a href="tel:994" class="sos">SOS</a>
        <div class="nav">
            <div class="item">🧭<br>رادار</div>
            <div class="item">🌦️<br>طقس</div>
            <div class="item" style="color:var(--blue)">⚓<br>خرائط</div>
            <div class="item">🛠️<br>صيانة</div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([21.45, 39.12], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png').addTo(map);
        map.locate({setView: true, watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            if (!window.m) window.m = L.circleMarker(e.latlng, {color: '#00f2ff', radius: 10}).addTo(map);
            else window.m.setLatLng(e.latlng);
            document.getElementById('s').innerText = (e.speed * 1.94 || 0).toFixed(1);
        });
        window.onload = () => { window.speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome Captain Ahmad. V 10 Online.")); };
    </script>
</body>
</html>
