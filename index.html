<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAN MARINE V63 - FIXED MOBILE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --danger: #ff3131; --panel-bg: #011627; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: sans-serif; overflow: hidden;
        }

        /* شريط التنقل العلوي */
        .top-nav { 
            display: flex; background: var(--panel-bg); height: 60px; 
            border-bottom: 2px solid var(--neon); z-index: 2000; position: relative;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #8899a6; font-size: 8px; font-weight: bold; cursor: pointer; border-left: 1px solid #1a3a4a;
        }
        .nav-item.active { color: var(--neon); background: rgba(0, 242, 255, 0.1); }
        .nav-item.sos-btn { background: var(--danger); color: white; border: none; font-size: 14px; }

        /* حاوية الصفحات - ضبط الارتفاع التلقائي */
        .page-container { height: calc(100% - 60px); width: 100%; position: relative; }
        .page { display: none; height: 100%; width: 100%; overflow-y: auto; background: #000; color: white; box-sizing: border-box; padding: 15px; }
        .page.active { display: block; }
        
        #map { height: 100%; width: 100%; z-index: 1; }

        /* تنسيق بطاقات البيانات للجوال */
        .card { 
            background: rgba(2, 44, 67, 0.9); border: 1px solid var(--neon); 
            border-radius: 8px; padding: 15px; margin-bottom: 12px;
        }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #112d42; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-item sos-btn" onclick="triggerSOS()">🚨 SOS</div>
        <div class="nav-item" onclick="showPage('spotsPage', this)">📍 SPOTS</div>
        <div class="nav-item active" onclick="showPage('navPage', this)">🧭 NAV</div>
        <div class="nav-item" onclick="showPage('enginePage', this)">🔧 ENGINE</div>
        <div class="nav-item" onclick="showPage('weatherPage', this)">☁️ WEATHER</div>
    </nav>

    <div class="page-container">
        <div id="navPage" class="page active" style="padding:0;">
            <div id="map"></div>
        </div>

        <div id="enginePage" class="page">
            <h3>🔧 متابعة الصيانة</h3>
            <div class="card">
                <p style="font-size: 12px; color: var(--neon);">ساعات تشغيل المحرك</p>
                <p style="font-size: 2.5rem; text-align: center; margin: 10px 0;">145.5 hr</p>
            </div>
            <div class="card">
                <div class="data-row"><span>موعد الزيت القادم</span><span style="color:var(--danger)">بعد 15 ساعة</span></div>
                <div class="data-row"><span>آخر فحص فلتر</span><span>2026-04-10</span></div>
            </div>
            <button style="width:100%; padding:15px; background:var(--neon); border:none; font-weight:bold; border-radius:8px;">تسجيل صيانة جديدة</button>
        </div>

        <div id="weatherPage" class="page">
            <h3>☁️ حالة البحر والرياح</h3>
            <div class="card">
                <div class="data-row"><span>سرعة الرياح</span><span style="color:var(--neon)">14 عقدة NW</span></div>
                <div class="data-row"><span>ارتفاع الموج</span><span>0.6 - 1.1 متر</span></div>
                <div class="data-row"><span>الرؤية</span><span>ممتازة</span></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([21.45, 39.12], 12);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 13 }).addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', { maxZoom: 13 }).addTo(map);

        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            if(pageId === 'navPage') setTimeout(() => map.invalidateSize(), 300);
        }

        function triggerSOS() {
            const phone = localStorage.getItem('emergency_num') || "994";
            window.open(`https://api.whatsapp.com/send?phone=${phone}&text=استغاثة_SOS`, '_blank');
        }

        map.locate({watch: true, setView: true, maxZoom: 16});
        map.on('locationfound', (e) => {
            if (!window.boatMarker) {
                window.boatMarker = L.circleMarker(e.latlng, {color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, radius: 10}).addTo(map);
            } else { window.boatMarker.setLatLng(e.latlng); }
        });
    </script>
</body>
</html>
