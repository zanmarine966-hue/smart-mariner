<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAN MARINE V47 - NAUTICAL PRO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00f2ff; --white: #ffffff; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; background: #000b14; }
        
        /* شريط ملاحي بتباين فائق */
        .mariner-hud { position: absolute; top: 0; width: 100%; z-index: 10; background: rgba(0,0,0,0.9); display: flex; padding: 15px 0; border-bottom: 3px solid var(--neon); box-shadow: 0 4px 15px #000; }
        .data-cell { flex: 1; text-align: center; border-left: 1px solid #333; }
        .val { display: block; font-size: 2.2rem; font-weight: 900; color: var(--white); text-shadow: 2px 2px #000; }
        .lbl { font-size: 11px; color: var(--neon); font-weight: bold; text-transform: uppercase; }

        .nav-tools { position: absolute; right: 15px; top: 120px; z-index: 20; display: flex; flex-direction: column; gap: 15px; }
        .btn-mariner { width: 60px; height: 60px; background: #111; border: 2px solid var(--neon); border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 0 15px rgba(0,242,255,0.4); }
        
        /* تحسين رؤية الأسماء الملاحية */
        .bright-labels { filter: brightness(1.5) contrast(1.2) saturate(1.5); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="mariner-hud">
        <div class="data-cell"><span class="lbl">SOG عقدة</span><span class="val" id="speed">0.0</span></div>
        <div class="data-cell"><span class="lbl">COG الاتجاه</span><span class="val" id="cog">--</span></div>
        <div class="data-cell"><span class="lbl">إحداثيات الملاحة</span><span class="val" id="pos" style="font-size: 13px;">...</span></div>
    </div>

    <div class="nav-tools">
        <div class="btn-mariner" onclick="map.locate({setView: true})">🧭</div>
        <div class="btn-mariner" onclick="toggleNautical()" id="modeBtn">🗺️</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 20 }).setView([21.45, 39.12], 13);
        
        // 1. طبقة الساتلايت الأساسية
        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 }).addTo(map);
        
        // 2. طبقة المسميات والأعماق (العربية والإنجليزية)
        const marineLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Reference/MapServer/tile/{z}/{y}/{x}', { 
            maxZoom: 20, 
            className: 'bright-labels' 
        }).addTo(map);

        // 3. طبقة OpenSeaMap الملاحية (لإظهار العوامات والمنارات)
        const openSeaMap = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', { maxZoom: 18 });

        function toggleNautical() {
            if (map.hasLayer(openSeaMap)) {
                map.removeLayer(openSeaMap);
                document.getElementById('modeBtn').style.background = "#111";
            } else {
                openSeaMap.addTo(map);
                document.getElementById('modeBtn').style.background = "var(--neon)";
                alert("تم تفعيل العلامات الملاحية (العوامات والمنارات)");
            }
        }

        map.locate({watch: true, enableHighAccuracy: true});
        map.on('locationfound', (e) => {
            document.getElementById('speed').innerText = (e.speed * 1.94 || 0).toFixed(1);
            if(e.heading) document.getElementById('cog').innerText = Math.round(e.heading) + '°';
            document.getElementById('pos').innerText = e.lat.toFixed(5) + "," + e.lng.toFixed(5);
            if (!window.boatMarker) {
                window.boatMarker = L.circleMarker(e.latlng, {color: '#fff', fillColor: '#00f2ff', fillOpacity: 1, radius: 11, weight: 4}).addTo(map);
            } else { window.boatMarker.setLatLng(e.latlng); }
        });
    </script>
</body>
</html>
